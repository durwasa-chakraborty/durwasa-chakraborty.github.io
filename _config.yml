# Site
name: "Anachronistic Monk"
title: "Anachronistic Monk"
description: "Durwasa Chakraborty"
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: ''

include: ["_pages"]
permalink: /:title/

# Authors
authors:
  durwasa:
    name: Durwasa Chakraborty
    display_name: Durwasa
    gravatar: bb8a27fdeae77377eb0915055c800fb5
    avatar: assets/images/avatar.jpg
    email: durwasa@chakraborty.dev
    web: https://www.chakraborty.dev
    twitter: https://twitter.com/durwasa_dc
    description: "MS Computer Science | Northeastern University | Programming Language | Python | Django | Boston | Bengali |"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Lazy Images ("enabled" or "disabled")
lazyimages: "enabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]